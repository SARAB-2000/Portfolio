name: portfolio
description: A dynamic bilingual portfolio app inspired by Fastfolio.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  provider: ^6.1.2
  url_launcher: ^6.3.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: assets/images/icon.png
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/images/icon.png
    background_color: '#12121A'
    theme_color: '#6366F1'
  windows:
    generate: true
    image_path: assets/images/icon.png
  macos:
    generate: true
    image_path: assets/images/icon.png
  linux:
    generate: true
    image_path: assets/images/icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/images/projects/
